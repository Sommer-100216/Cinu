<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>☀️🏡 Cinu - Nuestro Hogar 🌸</title>

<style>
body{
  margin:0;
  font-family:'Courier New', monospace;
  overflow-x:hidden;
  background-size: cover;
  background-position: center;
}

/* IMPORTANTE: que no tapen el fondo */
#exterior, #interior{
  background: transparent;
  width:100%;
  height:100vh;
}
#casaGrid{
  display:grid;
  grid-template-areas:
  "bebe bebe bebe"
  "biblioteca sala observatorio"
  "entrada entrada entrada";

  grid-template-columns:1fr 2fr 1fr;
  grid-template-rows:1fr 2fr 1fr;

  height:100%;
  padding:20px;
  gap:10px;
}

.box{
  border:2px solid #ddd;
  border-radius:10px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  cursor:pointer;
}

#bebe{ grid-area:bebe; }
#biblioteca{ grid-area:biblioteca; }
#sala{ grid-area:sala; }
#observatorio{ grid-area:observatorio; }
#entrada{ grid-area:entrada; }

/* MODAL */
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

#modalContent{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#ff7aa8;
  color:white;
}
</style>
</head>

<body>

<!-- EXTERIOR -->
<div id="exterior">
  <div id="cerezo">
    <h1>🌸 Cerezo de Cinu</h1>
    <div>Mi amor por ti comenzó hace...</div>
    <div id="contador"></div>
  </div>

  <div id="sendero">🌷🌷🌷🌷🌷</div>

  <div id="casa" onclick="entrarCasa()">🏡</div>
</div>

<!-- INTERIOR -->
<div id="interior">
  <div id="casaGrid">

    <div class="box" onclick="abrirBebe()">👶 Cuarto del Bebito</div>
    <div class="box">📚 Biblioteca</div>
    <div class="box">🛋️ Sala de Estar</div>
    <div class="box">🔭 Observatorio</div>

    <div class="box" onclick="salirCasa()">🚪 Salir al jardín</div>

  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">
    <h2>👶 Bebito</h2>
    <p id="estadoBebe">Estado</p>

    <button onclick="alimentarBebe()">🍎 Alimentar</button>
    <button onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<!-- SCRIPTS -->
<script>
/* 🌤️ CAMBIO DE HORA */
function actualizarEscena(){
  document.body.style.backgroundImage = "url('https://i.imgur.com/9jZ7M7R.jpg')";
  document.body.style.backgroundSize = "cover";
  document.body.style.backgroundPosition = "center";

}

/* INICIO */
document.addEventListener("DOMContentLoaded", () => {
  actualizarEscena();
  setInterval(actualizarEscena, 60000);
});

/* CASA */
function entrarCasa(){
  document.getElementById("exterior").style.display = "none";
  document.getElementById("interior").style.display = "block";
}

function salirCasa(){
  document.getElementById("interior").style.display = "none";
  document.getElementById("exterior").style.display = "flex";
}

/* BEBÉ */
function abrirBebe(){
  document.getElementById("modal").style.display = "flex";
  actualizarEstadoBebe();
}

function cerrarModal(){
  document.getElementById("modal").style.display = "none";
}

function actualizarEstadoBebe(){
  if(!window.cinu || !cinu.bebe) return;

  const b = cinu.bebe;

  document.getElementById("estadoBebe").innerHTML =
  `🍎 Hambre: ${Math.floor(b.hambre)}%<br>
   ❤️ Salud: ${Math.floor(b.salud)}%<br>
   😊 Felicidad: ${Math.floor(b.felicidad)}%`;
}

/* LOOP */
setInterval(() => {
  if (typeof actualizarBebe === "function") actualizarBebe();
  if (typeof guardarCinu === "function") guardarCinu();

  if(document.getElementById("modal").style.display === "flex"){
    actualizarEstadoBebe();
  }
}, 3000);
</script>

<script src="contador.js"></script>
<script src="cinu.js"></script>
<script src="bebe.js"></script>

</body>
</html>
