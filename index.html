<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cinu - Nuestro Hogar 🏡🌸</title>

<style>

/* ======================
   BASE
====================== */

body{
  margin:0;
  font-family:'Courier New', monospace;
  background:#f7e9ee;
  overflow-x:hidden;
}

/* ======================
   EXTERIOR
====================== */

#exterior{
  position:relative;
  width:100%;
  height:100vh;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;

  background:linear-gradient(#ffdce6,#fff);
}

/* CEREZO */

#cerezo{
  margin-top:30px;
  text-align:center;
}

#cerezo h1{
  font-size:22px;
  margin:10px;
}

#contador{
  font-size:18px;
  color:#c03a6b;
  margin-top:10px;
}

/* SENDERO */

#sendero{
  margin-top:30px;
  font-size:30px;
}

/* CASA */

#casa{
  margin-top:30px;
  cursor:pointer;
  font-size:60px;
  transition:0.3s;
}

#casa:hover{
  transform:scale(1.1);
}

/* ======================
   INTERIOR
====================== */

#interior{
  display:none;
  width:100%;
  height:100vh;
  background:#fdf6f8;
}

/* GRID CASA */

#casaGrid{
  display:grid;
  grid-template-areas:
  "bebe bebe bebe"
  "biblioteca sala observatorio"
  "entrada entrada entrada";

  grid-template-columns:1fr 2fr 1fr;
  grid-template-rows:1fr 2fr 1fr;

  height:100%;
  padding:20px;
  gap:10px;
}

/* HABITACIONES */

.box{
  border:2px solid #ddd;
  border-radius:10px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  cursor:pointer;
  position:relative;
}

/* POSICIONES */

#bebe{ grid-area:bebe; }
#biblioteca{ grid-area:biblioteca; }
#sala{ grid-area:sala; }
#observatorio{ grid-area:observatorio; }
#entrada{ grid-area:entrada; }

/* ======================
   MODAL BEBE
====================== */

#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);

  display:none;
  align-items:center;
  justify-content:center;
}

#modalContent{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#ff7aa8;
  color:white;
}

</style>
</head>

<body>

<!-- ======================
     EXTERIOR
====================== -->

<div id="exterior">

  <div id="cerezo">

    <h1>🌸 Cerezo de Cinu</h1>

    <div>Mi amor por ti comenzó hace...</div>

    <div id="contador"></div>

  </div>

  <div id="sendero">🌷🌷🌷🌷🌷</div>

  <div id="casa" onclick="entrarCasa()">🏡</div>

</div>

<!-- ======================
     INTERIOR
====================== -->

<div id="interior">

  <div id="casaGrid">

    <div class="box" id="bebe" onclick="abrirBebe()">
      👶 Cuarto del Bebito
    </div>

    <div class="box" id="biblioteca">
      📚 Biblioteca
    </div>

    <div class="box" id="sala">
      🛋️ Sala de Estar
    </div>

    <div class="box" id="observatorio">
      🔭 Observatorio
    </div>

    <div class="box" id="entrada" onclick="salirCasa()">
      🚪 Salir al jardín
    </div>

  </div>

</div>

<!-- ======================
     MODAL BEBE
====================== -->

<div id="modal">

  <div id="modalContent">

    <h2>👶 Bebito</h2>

    <p id="estadoBebe">Estado</p>

    <button onclick="alimentarBebe()">🍎 Alimentar</button>

    <button onclick="cerrarModal()">Cerrar</button>

  </div>

</div>

<!-- ======================
     SCRIPTS
====================== -->

<script src="js/cinu.js"></script>
<script src="js/bebe.js"></script>

<script>

/* ======================
   NAVEGACIÓN
====================== */

function entrarCasa(){
  document.getElementById("exterior").style.display = "none";
  document.getElementById("interior").style.display = "block";
}

function salirCasa(){
  document.getElementById("interior").style.display = "none";
  document.getElementById("exterior").style.display = "flex";
}

/* ======================
   MODAL BEBE
====================== */

function abrirBebe(){

  document.getElementById("modal").style.display = "flex";

  actualizarEstadoBebe();

}

function cerrarModal(){
  document.getElementById("modal").style.display = "none";
}

/* ======================
   UI BEBE
====================== */

function actualizarEstadoBebe(){

  const b = cinu.bebe;

  document.getElementById("estadoBebe").innerHTML =
  `🍎 Hambre: ${Math.floor(b.hambre)}%
   ❤️ Salud: ${Math.floor(b.salud)}%
   😊 Felicidad: ${Math.floor(b.felicidad)}%`;

}

/* ======================
   LOOP
====================== */

setInterval(()=>{

  actualizarBebe();

  guardarCinu();

  if(document.getElementById("modal").style.display === "flex"){
    actualizarEstadoBebe();
  }

}, 3000);

</script>

</body>
</html>
