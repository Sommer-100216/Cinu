<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>☀️🌸🏡☀️ Cinu - Nuestro Hogar 🌸</title>

<style>

/* ======================
   BASE GLOBAL
====================== */
html, body{
  margin:0;
  padding:0;
  height:100%;
}

body{
  font-family:'Courier New', monospace;
  overflow-x:hidden;
  background-position:center;
  background-repeat:no-repeat;
  transition:2s ease;
  position:relative;
}

/* ======================
   FONDO POR DISPOSITIVO
====================== */
@media (min-width: 768px){
  body{
    background-size:contain;
    background-color:#1a0f14;
  }
}

@media (max-width: 767px){
  body{
    background-size:cover;
  }
}

/* ======================
   EXTERIOR / INTERIOR
====================== */
#exterior, #interior{
  width:100%;
  height:100vh;
  background:transparent;
}

/* ======================
   🌸 EXTERIOR
====================== */
#cerezo{
  margin-top:30px;
  text-align:center;
}

/* ======================
   🔥 CONTADOR (HUD FIJO)
====================== */
#contador-box{
  position:fixed;
  top:55%;
  left:52%;
  transform:translate(-50%, -50%);

  z-index:99999;
  text-align:center;

  color:#c03a6b;
  font-size:18px;

  padding:10px 15px;

  background:rgba(26, 15, 20, 0.25);
  border:1px solid rgba(192, 58, 107, 0.4);
  border-radius:10px;

  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);

  pointer-events:none;

  animation:latido 2s infinite ease-in-out;
}

@keyframes latido{
  0%   { transform:translate(-50%, -50%) scale(1); }
  50%  { transform:translate(-50%, -50%) scale(1.05); }
  100% { transform:translate(-50%, -50%) scale(1); }
}

/* ======================
   CAMINO + CASA
====================== */
#sendero{
  margin-top:30px;
  font-size:30px;
  text-align:center;
}

#casa{
  margin-top:30px;
  cursor:pointer;
  font-size:60px;
  transition:0.3s;
  text-align:center;
}

#casa:hover{
  transform:scale(1.1);
}

/* ======================
   INTERIOR
====================== */
#interior{
  display:none;
}

#casaGrid{
  display:grid;
  grid-template-areas:
  "bebe bebe bebe"
  "biblioteca sala observatorio"
  "entrada entrada entrada";

  grid-template-columns:1fr 2fr 1fr;
  grid-template-rows:1fr 2fr 1fr;

  height:100vh;
  padding:20px;
  gap:10px;
}

.box{
  border:2px solid #ddd;
  border-radius:10px;
  background:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:18px;
  cursor:pointer;
}

/* ÁREAS */
#bebe{ grid-area:bebe; }
#biblioteca{ grid-area:biblioteca; }
#sala{ grid-area:sala; }
#observatorio{ grid-area:observatorio; }
#entrada{ grid-area:entrada; }

/* ======================
   MODAL
====================== */
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);

  display:none;
  align-items:center;
  justify-content:center;

  z-index:9999;
}

#modalContent{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#ff7aa8;
  color:white;
}

</style>
</head>

<body>

<!-- 🌸 EXTERIOR -->
<div id="exterior">

  <div id="cerezo">
    <h1>🌸 Cerezo de Cinu</h1>
    <div>Mi amor por ti comenzó hace...</div>
  </div>

  <!-- 🔥 CONTADOR -->
  <div id="contador-box">
    <div id="contador"></div>
  </div>

  <div id="sendero">🌷🌷🌷🌷🌷</div>

  <div id="casa" onclick="entrarCasa()">🏡</div>

</div>

<!-- 🏡 INTERIOR -->
<div id="interior">

  <div id="casaGrid">

    <div class="box" onclick="abrirBebe()">👶 Cuarto del Bebito</div>
    <div class="box" id="biblioteca">📚 Biblioteca</div>
    <div class="box" id="sala">🛋️ Sala de Estar</div>
    <div class="box" id="observatorio">🔭 Observatorio</div>

    <div class="box" id="entrada" onclick="salirCasa()">🚪 Salir al jardín</div>

  </div>
</div>

<!-- 👶 MODAL -->
<div id="modal">
  <div id="modalContent">

    <h2>👶 Bebito</h2>
    <p id="estadoBebe">Estado</p>

    <button onclick="alimentarBebe()">🍎 Alimentar</button>
    <button onclick="cerrarModal()">Cerrar</button>

  </div>
</div>

<!-- ======================
     SCRIPTS
====================== -->
<script src="cinu.js"></script>
<script src="bebe.js"></script>
<script src="contador.js"></script>
<script src="main.js"></script>

<script>
function entrarCasa(){
  document.getElementById("exterior").style.display = "none";
  document.getElementById("interior").style.display = "block";
}

function salirCasa(){
  document.getElementById("interior").style.display = "none";
  document.getElementById("exterior").style.display = "block";
}
</script>

</body>
</html>
