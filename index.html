<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>☀️Bienvendido a nuestro hogar✨</title>

<style>

/* ======================
   BASE GLOBAL
====================== */
html, body{
  margin:0;
  padding:0;
  height:100%;
}

body{
  font-family:'Courier New', monospace;
  overflow-x:hidden;

  background-position: center;
  background-repeat: no-repeat;

  transition: 2s ease;
}

/* PC */
@media (min-width: 768px){
  body{
    background-size: contain;
    background-color: #1a0f14;
  }
}

/* móvil */
@media (max-width: 767px){
  body{
    background-size: cover;
  }
}

/* ======================
   CASAS
====================== */
#exterior, #interior{
  width:100%;
  height:100vh;
  background:transparent;
}

/* ======================
   🌸 EXTERIOR
====================== */
#cerezo{
  margin-top:30px;
  text-align:center;
}

/* 🔥 CONTADOR FIJO */
#contador-box{
   #texto-amor{
  font-size:13px;
  font-weight:bold;
  color:pink;
  margin-bottom:6px;
  text-shadow: 0 0 5px rgba(255,255,255,.5);
}
  position: absolute;

  top: 37%;
  left: 35%;
  transform: translate(-50%, -50%);

  text-align:center;

  color:pink;
  font-size:15px;
  font-weight:bold;

  z-index: 99999; /* 🔥 SIEMPRE ENCIMA */

  padding: 10px 15px;

  background: transparent;
  border: none;
  box-shadow: none;
  backdrop-filter: none;
   -webkit-backdrop-filter: none;

  pointer-events: none; /* 🔥 no bloquea clicks del juego */

  animation: latido 2s infinite ease-in-out;
}
/* 💓 efecto mágico */
@keyframes latido{
  0%   { transform: translate(-50%, -50%) scale(1); }
  50%  { transform: translate(-50%, -50%) scale(1.05); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

#sendero{
  margin-top:30px;
  font-size:30px;
}

#casa{
  margin-top:30px;
  cursor:pointer;
  font-size:60px;
  transition:0.3s;
  text-align:center;
}

#casa:hover{
  transform:scale(1.1);
}

/* ======================
   🏡 INTERIOR
====================== */
#interior{
  display:none;
}

   .habitacion{
  width:100vw;
  height:100vh;

  position:relative;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:40px;
}

.puerta{
  position:absolute;

  padding:12px 25px;

  font-size:25px;

  border:none;
  border-radius:15px;

  cursor:pointer;
}

.arriba{
  top:30px;
  left:50%;
  transform:translateX(-50%);
}

.izquierda{
  left:30px;
  top:50%;
  transform:translateY(-50%);
}

.derecha{
  right:30px;
  top:50%;
  transform:translateY(-50%);
}

.abajo{
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
}

   
#casaGrid{
  display:grid;
  grid-template-areas:
  "bebe bebe bebe"
  "biblioteca sala observatorio"
  "entrada entrada entrada";

  grid-template-columns:1fr 2fr 1fr;
  grid-template-rows:1fr 2fr 1fr;

  height:100vh;
  padding:20px;
  gap:10px;
}

.box{
  border:2px solid #ddd;
  border-radius:10px;
  background:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:18px;
  cursor:pointer;
}

/* ÁREAS */
#bebe{ grid-area:bebe; }
#biblioteca{ grid-area:biblioteca; }
#sala{ grid-area:sala; }
#observatorio{ grid-area:observatorio; }
#entrada{ grid-area:entrada; }

/* ======================
   👶 MODAL
====================== */
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:rgba(0,0,0,0.6);
  display:none;

  align-items:center;
  justify-content:center;
}

#modalContent{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#ff7aa8;
  color:white;
}

</style>
</head>

<body>

<!-- 🌸 EXTERIOR -->
<div id="exterior">

  <div id="cerezo">
    <h1><i><b>☀️Bienvendido a nuestro hogar✨</b></i></h1>
  </div>

  <!-- 💓 BLOQUE FIJO -->
 <div id="contador-box">

  <div id="texto-amor">
    Mi amor a ti inicio hace:
  </div>
  <div id="contador"></div>

    
</div>

   

  <div id="sendero">🌷🌷🌷🌷🌷</div>

  <div id="casa" onclick="entrarCasa()">🏡</div>

</div>

<!-- 🏡 INTERIOR -->
<div id="interior" style="display:none;">

  <!-- 🛋️ SALA -->
  <div id="salaHabitacion" class="habitacion">

    <h1>🛋️ Sala</h1>

    <button class="puerta arriba" onclick="abrirBebe()">
      👶 Bebito
    </button>

    <button class="puerta izquierda" onclick="abrirBiblioteca()">
      📚 Biblioteca
    </button>

    <button class="puerta derecha" onclick="abrirObservatorio()">
      🔭 Observatorio
    </button>

    <button class="puerta abajo" onclick="salirCasa()">
      🚪 Salir
    </button>

  </div>

  <!-- 👶 BEBÉ (pantalla completa) -->
  <div id="bebeHabitacion" class="habitacion" style="display:none;">
    <h1>👶 Cuarto del Bebito</h1>

    <button class="puerta abajo" onclick="volverSala()">
      🔙 Volver a Sala
    </button>
  </div>

  <!-- 📚 BIBLIOTECA -->
  <div id="bibliotecaHabitacion" class="habitacion" style="display:none;">
    <h1>📚 Biblioteca</h1>

    <button class="puerta abajo" onclick="volverSala()">
      🔙 Volver a Sala
    </button>
  </div>

  <!-- 🔭 OBSERVATORIO -->
  <div id="observatorioHabitacion" class="habitacion" style="display:none;">
    <h1>🔭 Observatorio</h1>

    <button class="puerta abajo" onclick="volverSala()">
      🔙 Volver a Sala
    </button>
  </div>

</div>

<!-- 👶 MODAL -->
<div id="modal">
  <div id="modalContent">

    <h2>👶 Bebito</h2>
    <p id="estadoBebe">Estado</p>

    <button onclick="alimentarBebe()">🍎 Alimentar</button>
    <button onclick="cerrarModal()">Cerrar</button>

  </div>
</div>

<script>

/* 🌤️ FONDO POR HORA */
function actualizarEscena(){

  const hora = new Date().getHours();
  let fondo = "";

  if (hora >= 5 && hora < 8) fondo = "main-time/amanecer.jpg";
  else if (hora >= 8 && hora < 12) fondo = "main-time/dia.jpg";
  else if (hora >= 12 && hora < 15) fondo = "main-time/mediodia.jpg";
  else if (hora >= 15 && hora < 19) fondo = "main-time/atardecer.jpg";
  else fondo = "main-time/noche.jpg";

  document.body.style.backgroundImage = `url('${fondo}')`;
}

/* INICIO */
document.addEventListener("DOMContentLoaded", () => {
  actualizarEscena();
  setInterval(actualizarEscena, 60000);
});

/* 🏡 CASA */
function entrarCasa(){
  document.getElementById("exterior").style.display = "none";
  document.getElementById("interior").style.display = "block";
}

function salirCasa(){
  document.getElementById("interior").style.display = "none";
  document.getElementById("exterior").style.display = "block";
}


function cerrarModal(){
  document.getElementById("modal").style.display = "none";
}

function alimentarBebe(){

  if(!window.cinu || !cinu.bebe) return;

  cinu.bebe.hambre = Math.max(0, cinu.bebe.hambre - 10);
  cinu.bebe.salud = Math.min(100, cinu.bebe.salud + 2);

  actualizarEstadoBebe();
}

function actualizarEstadoBebe(){

  if(!window.cinu || !cinu.bebe){
    document.getElementById("estadoBebe").innerHTML = "Cargando bebé...";
    return;
  }

  const b = cinu.bebe;

  document.getElementById("estadoBebe").innerHTML =
  `🍎 Hambre: ${Math.floor(b.hambre)}%<br>
   ❤️ Salud: ${Math.floor(b.salud)}%<br>
   😊 Felicidad: ${Math.floor(b.felicidad)}%`;
}


   
/* LOOP */
setInterval(() => {

  if(typeof actualizarBebe === "function") actualizarBebe();
  if(typeof guardarCinu === "function") guardarCinu();

  if(document.getElementById("modal").style.display === "flex"){
    actualizarEstadoBebe();
  }

}, 3000);


/* 🧠 CONTROL DE HABITACIONES */
function ocultarTodo(){
  document.getElementById("salaHabitacion").style.display = "none";
  document.getElementById("bebeHabitacion").style.display = "none";
  document.getElementById("bibliotecaHabitacion").style.display = "none";
  document.getElementById("observatorioHabitacion").style.display = "none";
}

function abrirBebe(){
  ocultarTodo();
  document.getElementById("bebeHabitacion").style.display = "flex";
}

function abrirBiblioteca(){
  ocultarTodo();
  document.getElementById("bibliotecaHabitacion").style.display = "flex";
}

function abrirObservatorio(){
  ocultarTodo();
  document.getElementById("observatorioHabitacion").style.display = "flex";
}

function volverSala(){
  ocultarTodo();
  document.getElementById("salaHabitacion").style.display = "flex";
}


   
<script src="cinu.js" defer></script>
<script src="bebe.js" defer></script>
<script src="contador.js" defer></script>
<script src="libros.js" defer></script>
<script src="biblioteca.js" defer></script>
<script src="main.js" defer></script>

   
   
</body>
</html>
