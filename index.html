<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>☀️Bienvendido a nuestro hogar✨</title>

<style>

/* ======================
   BASE GLOBAL
====================== */
html, body{
  margin:0;
  padding:0;
  height:100%;
}

body{
  font-family:'Courier New', monospace;
  overflow-x:hidden;
  background-position: center;
  background-repeat: no-repeat;
  transition: 2s ease;
}

/* PC */
@media (min-width: 768px){
  body{
    background-size: contain;
    background-color: #1a0f14;
  }
}

/* móvil */
@media (max-width: 767px){
  body{
    background-size: cover;
  }
}

/* ======================
   CASAS
====================== */
#exterior, #interior{
  width:100%;
  height:100vh;
  background:transparent;
}

/* ======================
   🌸 EXTERIOR
====================== */
#cerezo{
  margin-top:30px;
  text-align:center;
}

/* CONTADOR */
#contador-box{
  position: absolute;
  top: 37%;
  left: 35%;
  transform: translate(-50%, -50%);
  text-align:center;
  color:pink;
  font-size:15px;
  font-weight:bold;
  z-index:99999;
  background: transparent;
  border:none;
  pointer-events:none;
}

#sendero{
  margin-top:30px;
  font-size:30px;
}

#casa{
  margin-top:30px;
  cursor:pointer;
  font-size:60px;
  transition:0.3s;
  text-align:center;
}

#casa:hover{
  transform:scale(1.1);
}

/* ======================
   🏡 HABITACIONES
====================== */
.habitacion{
  width:100vw;
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

.puerta{
  position:absolute;
  padding:12px 25px;
  font-size:25px;
  border:none;
  border-radius:15px;
  cursor:pointer;
}

.arriba{ top:30px; left:50%; transform:translateX(-50%); }
.izquierda{ left:30px; top:50%; transform:translateY(-50%); }
.derecha{ right:30px; top:50%; transform:translateY(-50%); }
.abajo{ bottom:30px; left:50%; transform:translateX(-50%); }

/* ======================
   MODAL
====================== */
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

#modalContent{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#ff7aa8;
  color:white;
}

</style>
</head>

<body>

<!-- 🌸 EXTERIOR -->
<div id="exterior">

  <div id="cerezo">
    <h1><i><b>☀️Bienvendido a nuestro hogar✨</b></i></h1>
  </div>

  <div id="contador-box">
    <div>Mi amor a ti inicio hace:</div>
    <div id="contador"></div>
  </div>

  <div id="sendero">🌷🌷🌷🌷🌷</div>
  <div id="casa" onclick="entrarCasa()">🏡</div>
</div>

<!-- 🏡 INTERIOR (SOLO UNO, FIX IMPORTANTE) -->
<div id="interior" style="display:none;">

  <div id="salaHabitacion" class="habitacion">

    <h1>🛋️ Sala</h1>

    <button class="puerta arriba" onclick="abrirBebe()">👶 Bebito</button>
    <button class="puerta izquierda" onclick="abrirBiblioteca()">📚 Biblioteca</button>
    <button class="puerta derecha" onclick="abrirObservatorio()">🔭 Observatorio</button>
    <button class="puerta abajo" onclick="salirCasa()">🚪 Salir</button>

  </div>
</div>

<!-- 👶 MODAL (SOLO UNO) -->
<div id="modal">
  <div id="modalContent">

    <h2>👶 Bebito</h2>
    <p id="estadoBebe">Estado</p>

    <button onclick="alimentarBebe()">🍎 Alimentar</button>
    <button onclick="cerrarModal()">Cerrar</button>

  </div>
</div>

<script src="cinu.js" defer></script>
<script src="bebe.js" defer></script>
<script src="contador.js" defer></script>
<script src="libros.js" defer></script>
<script src="biblioteca.js" defer></script>
<script src="main.js" defer></script>

</body>
</html>
